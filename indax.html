<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/midiasqueries.css">
<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>

            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) de novamente. Faça login para acessar sua conta, e poder fazer as configurações no seu ambiente. </p>
                <form action="banco.php" method="post">
                    <div class="campo">
                        <span class="material-symbols-outlined">account_circle</span>
                        <input type="email" name="email" id="iimail" required maxlength="30">
                        <label for="iimail">Login</label>
                    </div>
                    <div class="campo">
                        <img src="./imagens/key_24dp_000000_FILL0_wght400_GRAD0_opsz24.png" alt="" class="material-symbols-outlined">
                        <input type="password" name="senha" id="isenha" required minlength="8">
                        <label for="isenha">Senha</label>
                    </div>
                    <input type="submit" value="Enviar">
                    <a href="#" class="link">Esqueci a senha</a>
                </form>
        </section>
    </main>
</body>
</html>
